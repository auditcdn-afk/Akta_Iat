<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - SIMPAS-IAT</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1120;
            color: #e9edf5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 24px;
        }
        .card { max-width: 360px; }
        .icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-weight: 800;
            font-size: 28px;
        }
        h1 { font-size: 18px; margin: 0 0 8px; }
        p { font-size: 14px; color: #aab2c5; margin: 0 0 20px; }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">S</div>
        <h1>Tidak ada koneksi internet</h1>
        <p>SIMPAS-IAT butuh koneksi internet untuk memuat data terbaru. Silakan periksa jaringan Anda lalu coba lagi.</p>
        <button onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
